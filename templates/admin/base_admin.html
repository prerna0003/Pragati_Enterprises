<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pragati Admin{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#8B0000;
            position:fixed;
            left:0;
            top:0;
            color:white;
            padding-top:20px;
        }

        .sidebar h3{
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 25px;
        }

        .sidebar a:hover{
            background:#6d0000;
        }

        .content{
            margin-left:260px;
            padding:30px;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }
    </style>

</head>

<body>

<div class="sidebar">

    <h3>Pragati</h3>

    <a href="{{ url_for('admin') }}">🏠 Dashboard</a>

    <a href="{{ url_for('add_product') }}">📦 Add Product</a>

    <a href="{{ url_for('products') }}">📋 Products</a>

    <li class="nav-item">
    <a class="nav-link" href="{{ url_for('admin_orders') }}">
        📦 Orders
    </a>
</li>

    <a href="#">👥 Customers</a>

</div>

<div class="content">

{% block content %}

{% endblock %}

</div>

</body>

</html>
