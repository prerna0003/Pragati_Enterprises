{% extends "admin/base_admin.html" %}

{% block title %}
Edit Product
{% endblock %}

{% block content %}

<h2>Edit Product</h2>

<form method="POST" enctype="multipart/form-data">

    <div class="mb-3">
        <label>Product Name</label>
        <input class="form-control"
               name="name"
               value="{{ product.name }}"
               required>
    </div>

    <div class="mb-3">
        <label>Category</label>
        <input class="form-control"
               name="category"
               value="{{ product.category }}"
               required>
    </div>

    <div class="mb-3">
        <label>Price</label>
        <input class="form-control"
               type="number"
               step="0.01"
               name="price"
               value="{{ product.price }}"
               required>
    </div>

    <div class="mb-3">
        <label>Stock</label>
        <input class="form-control"
               type="number"
               name="stock"
               value="{{ product.stock }}"
               required>
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea class="form-control"
                  name="description">{{ product.description }}</textarea>
    </div>

    <div class="mb-3">

        <label>Current Image</label><br>

        {% if product.image %}
            <img src="{{ url_for('static', filename='uploads/' + product.image) }}"
                 width="120"
                 class="mb-3">
        {% else %}
            No Image
        {% endif %}

    </div>

    <div class="mb-3">

        <label>Change Image</label>

        <input class="form-control"
               type="file"
               name="image">

    </div>

    <button class="btn btn-primary">
        Update Product
    </button>

</form>

{% endblock %}
