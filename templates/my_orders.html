{% extends "base.html" %}

{% block title %}
My Orders
{% endblock %}

{% block content %}

<div class="container py-5">

<h2>My Orders</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>Order ID</th>

<th>Total</th>

<th>Status</th>

</tr>

</thead>

<tbody>

{% for order in orders %}

<tr>

<td>#{{ order.id }}</td>

<td>₹ {{ order.total_amount }}</td>

<td>{{ order.status }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
